<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>予定カレンダー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap');

  :root {
    --cream:   #F4F1ED;
    --sand:    #E2D1C7;
    --rose:    #B4A093;
    --brown:   #8E7B6D;
    --dark:    #4D3F35;
    --white:   #FDFCFB;
    --border:  #E2D1C7;
    --muted:   #B4A093;
    --radius:  8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    letter-spacing: .03em;
  }

  header {
    background: var(--dark);
    color: var(--cream);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(77,63,53,.18);
  }
  header .logo-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.45rem;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
  }
  header .subtitle { font-size: .75rem; opacity: .6; margin-left: auto; letter-spacing: .12em; }

  .container { max-width: 1000px; margin: 0 auto; padding: 20px 16px; }

  /* メンバー選択 */
  .member-bar {
    background: var(--white);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .member-bar label { font-size: .78rem; font-weight: 600; color: var(--muted); margin-right: 4px; letter-spacing: .08em; text-transform: uppercase; }
  .member-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    cursor: pointer;
    font-size: .85rem;
    font-weight: 500;
    color: var(--brown);
    transition: all .15s;
  }
  .member-btn.active { background: var(--dark); border-color: var(--dark); color: var(--cream); }
  .member-btn:hover:not(.active) { border-color: var(--brown); color: var(--dark); }

  /* カレンダーナビ */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 12px;
  }
  .cal-nav button {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 14px;
    font-size: 1rem;
    cursor: pointer;
    color: var(--brown);
    transition: all .15s;
  }
  .cal-nav button:hover { background: var(--sand); border-color: var(--rose); }
  .cal-nav h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 600;
    letter-spacing: .15em;
    min-width: 160px;
    text-align: center;
    color: var(--dark);
  }

  /* カレンダーグリッド */
  .cal-wrap {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .cal-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--dark);
    color: var(--cream);
  }
  .cal-header div {
    text-align: center;
    padding: 10px 4px;
    font-size: .75rem;
    letter-spacing: .12em;
    font-weight: 500;
    opacity: .85;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .day-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 90px;
    padding: 5px;
    cursor: pointer;
    transition: background .12s;
    position: relative;
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { background: #F0EAE4; }
  .day-cell.empty { background: #FAF8F6; cursor: default; }
  .day-cell.selected { background: #EDE5DF; }
  .day-cell.selected .day-num { background: var(--dark); color: var(--cream); }
  .day-cell.today .day-num { border: 1.5px solid var(--dark); color: var(--dark); }

  .day-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    font-size: .83rem;
    font-weight: 600;
    margin-bottom: 3px;
    color: var(--dark);
  }
  .day-cell.sun .day-num { color: #9B6B5A; }
  .day-cell.sat .day-num { color: #7A8FA6; }
  .day-cell.selected.sun .day-num, .day-cell.selected.sat .day-num { color: var(--cream); }

  .avail-tags { display: flex; flex-direction: column; gap: 2px; }
  .avail-tag {
    font-size: .66rem;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 登録パネル */
  .register-panel {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .register-panel h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: .12em;
    margin-bottom: 12px;
    color: var(--dark);
    text-transform: uppercase;
  }

  .selected-dates {
    font-size: .83rem;
    color: var(--muted);
    margin-bottom: 12px;
    min-height: 20px;
  }

  .time-slots {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .slot-btn {
    padding: 7px 18px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    cursor: pointer;
    font-size: .85rem;
    font-weight: 500;
    color: var(--brown);
    transition: all .15s;
    letter-spacing: .05em;
  }
  .slot-btn:hover { border-color: var(--brown); }
  .slot-btn.selected { background: var(--dark); color: var(--cream); border-color: var(--dark); }

  .btn-register {
    background: var(--dark);
    color: var(--cream);
    border: none;
    border-radius: 6px;
    padding: 10px 26px;
    font-size: .88rem;
    font-weight: 600;
    letter-spacing: .08em;
    cursor: pointer;
    transition: opacity .15s;
  }
  .btn-register:hover { opacity: .82; }
  .btn-register:disabled { opacity: .35; cursor: default; }

  .btn-clear {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    font-size: .85rem;
    cursor: pointer;
    margin-left: 8px;
    color: var(--muted);
    transition: all .15s;
  }
  .btn-clear:hover { border-color: var(--brown); color: var(--dark); }

  /* 凡例 */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 8px;
    font-size: .78rem;
    color: var(--brown);
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; }

  /* メンバーカラー（アースtone） */
  .m0 { background: #9B6B5A; }
  .m1 { background: #8E7B6D; }
  .m2 { background: #7A8FA6; }
  .m3 { background: #7A9A87; }
  .m4 { background: #B4A093; }
  .m5 { background: #4D3F35; }

  .tag-m0 { background: #F5EAE6; color: #7A4A3A; }
  .tag-m1 { background: #EDE8E5; color: #5C4A3E; }
  .tag-m2 { background: #E6ECF2; color: #4A6078; }
  .tag-m3 { background: #E6EDEA; color: #3E6450; }
  .tag-m4 { background: #F0EAE6; color: #7A6258; }
  .tag-m5 { background: #E8E3DF; color: #3A2E28; }

  .notice {
    font-size: .78rem;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: .03em;
  }

  /* 削除ボタン（タグ内） */
  .del-entry {
    display: inline-block;
    margin-left: 3px;
    opacity: .45;
    cursor: pointer;
    font-size: .72rem;
  }
  .del-entry:hover { opacity: 1; }

  /* パスワード画面 */
  #pwScreen {
    position: fixed; inset: 0;
    background: var(--dark);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .pw-box {
    background: var(--cream);
    border-radius: 12px;
    padding: 40px 36px;
    text-align: center;
    box-shadow: 0 12px 48px rgba(0,0,0,.25);
    width: 300px;
  }
  .pw-box .pw-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 600;
    letter-spacing: .2em; text-transform: uppercase;
    color: var(--dark); margin-bottom: 4px;
  }
  .pw-box p { font-size: .78rem; color: var(--muted); margin-bottom: 22px; letter-spacing: .06em; }
  .pw-box input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid var(--border); border-radius: 6px;
    font-size: .95rem; outline: none; text-align: center;
    letter-spacing: .12em; background: var(--white);
    color: var(--dark);
    margin-bottom: 12px;
  }
  .pw-box input:focus { border-color: var(--dark); }
  .pw-box button {
    width: 100%; padding: 10px;
    background: var(--dark); color: var(--cream);
    border: none; border-radius: 6px;
    font-size: .88rem; font-weight: 600;
    letter-spacing: .1em; cursor: pointer;
  }
  .pw-box button:hover { opacity: .82; }
  .pw-error { color: #9B6B5A; font-size: .8rem; margin-top: 10px; display: none; }
</style>
</head>
<body>

<!-- パスワード画面 -->
<div id="pwScreen">
  <div class="pw-box">
    <div class="pw-title">Tsunagu</div>
    <p>パスワードを入力してください</p>
    <input type="password" id="pwInput" placeholder="パスワード" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">入る</button>
    <div class="pw-error" id="pwError">パスワードが違います</div>
  </div>
</div>

<header>
  <div class="logo-text">Tsunagu</div>
  <div class="subtitle">空き日程を共有しよう</div>
</header>

<div class="container">

  <!-- メンバー選択 -->
  <div class="member-bar">
    <label>自分：</label>
    <div id="memberBtns"></div>
  </div>

  <!-- 月ナビ -->
  <div class="cal-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <h2 id="calTitle"></h2>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>

  <!-- カレンダー -->
  <div class="cal-wrap">
    <div class="cal-header">
      <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- 登録パネル -->
  <div class="register-panel">
    <h3>選択した日に予定を登録</h3>
    <div class="selected-dates" id="selectedDatesText">カレンダーの日付をクリックして選択してください（複数可）</div>
    <div class="time-slots">
      <button class="slot-btn" data-slot="終日" onclick="toggleSlot(this)">終日</button>
      <button class="slot-btn" data-slot="午前" onclick="toggleSlot(this)">午前</button>
      <button class="slot-btn" data-slot="午後" onclick="toggleSlot(this)">午後</button>
      <button class="slot-btn" data-slot="夜" onclick="toggleSlot(this)">夜</button>
    </div>
    <div>
      <button class="btn-register" id="btnRegister" onclick="register()" disabled>登録する</button>
      <button class="btn-clear" onclick="clearSelection()">選択解除</button>
    </div>
    <div class="notice">※ 登録済みの予定はカレンダーのタグをクリックで削除できます</div>
  </div>

  <!-- 凡例 -->
  <div class="legend" id="legend"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

// ---- Firebase 初期化 ----
const firebaseConfig = {
  apiKey: "AIzaSyB5Pc0CC8Y9HChBU_qormSiceWwGnfGx8A",
  authDomain: "tsunagu-calendar.firebaseapp.com",
  projectId: "tsunagu-calendar",
  storageBucket: "tsunagu-calendar.firebasestorage.app",
  messagingSenderId: "397657215121",
  appId: "1:397657215121:web:6169d58c0de52a34ea2f30"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const entriesRef = doc(db, 'calendar', 'entries');

// ---- パスワード ----
const PW = 'tsunagu';
window.checkPw = function() {
  const val = document.getElementById('pwInput').value;
  if(val === PW) {
    try { localStorage.setItem('cal_auth', '1'); } catch(e) {}
    document.getElementById('pwScreen').style.display = 'none';
  } else {
    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').value = '';
  }
};
(function() {
  let ok = false;
  try { ok = localStorage.getItem('cal_auth') === '1'; } catch(e) {}
  if(ok) document.getElementById('pwScreen').style.display = 'none';
})();

// ---- データ ----
const MEMBERS = ['つっちー','たえみ','北ちゃん','めぐみ','りえ','makki'];
const SLOT_ORDER = ['終日','午前','午後','夜'];

let currentMember = 0;
let currentYear, currentMonth;
let selectedDates = new Set();
let selectedSlots = new Set();
let entries = {};

// ---- Firestore リアルタイム同期 ----
onSnapshot(entriesRef, (snap) => {
  entries = snap.exists() ? (snap.data().data || {}) : {};
  renderCalendar();
});

// ---- 初期化 ----
function init() {
  const today = new Date();
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();

  const names = MEMBERS.slice();
  const wrap = document.getElementById('memberBtns');
  wrap.style.display = 'flex';
  wrap.style.flexWrap = 'wrap';
  wrap.style.gap = '6px';
  names.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'member-btn' + (i === 0 ? ' active' : '');
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="legend-dot m${i}" style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle;"></span>`;
    const nameSpan = document.createElement('span');
    nameSpan.textContent = name;
    btn.appendChild(nameSpan);
    btn.addEventListener('click', () => {
      currentMember = i;
      document.querySelectorAll('.member-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
    wrap.appendChild(btn);
  });

  renderLegend();
  renderCalendar();
  updatePanel();
}

function renderLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = MEMBERS.map((n,i)=>`<div class="legend-item"><div class="legend-dot m${i}"></div>${n}</div>`).join('');
}

// ---- カレンダー描画 ----
function renderCalendar() {
  const title = `${currentYear}年 ${currentMonth+1}月`;
  document.getElementById('calTitle').textContent = title;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();
  const today = new Date();
  const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  for(let i = 0; i < firstDay; i++) {
    const cell = document.createElement('div');
    cell.className = 'day-cell empty';
    grid.appendChild(cell);
  }

  for(let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(currentYear, currentMonth, d);
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const cell = document.createElement('div');
    let cls = 'day-cell';
    if(dow === 0) cls += ' sun';
    if(dow === 6) cls += ' sat';
    if(key === todayKey) cls += ' today';
    if(selectedDates.has(key)) cls += ' selected';
    cell.className = cls;

    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    const tagsEl = document.createElement('div');
    tagsEl.className = 'avail-tags';
    const dayEntries = entries[key] || [];
    const seen = {};
    dayEntries.forEach(e => {
      const k = `${e.member}_${e.slot}`;
      if(!seen[k]) {
        seen[k] = true;
        const tag = document.createElement('div');
        tag.className = `avail-tag tag-m${e.member}`;
        const delBtn = document.createElement('span');
        delBtn.className = 'del-entry';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', ev => {
          ev.stopPropagation();
          if(confirm(`「${MEMBERS[e.member]} / ${e.slot}」を削除しますか？`)) {
            removeEntry(key, e.member, e.slot);
          }
        });
        tag.textContent = `${MEMBERS[e.member].slice(0,4)} ${e.slot}`;
        tag.appendChild(delBtn);
        tagsEl.appendChild(tag);
      }
    });
    cell.appendChild(tagsEl);
    cell.addEventListener('click', () => toggleDate(key, cell));
    grid.appendChild(cell);
  }
}

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

window.changeMonth = function(delta) {
  currentMonth += delta;
  if(currentMonth < 0) { currentMonth = 11; currentYear--; }
  if(currentMonth > 11) { currentMonth = 0; currentYear++; }
  selectedDates.clear();
  updatePanel();
  renderCalendar();
};

// ---- 日付選択 ----
function toggleDate(key, cell) {
  if(selectedDates.has(key)) {
    selectedDates.delete(key);
    cell.classList.remove('selected');
  } else {
    selectedDates.add(key);
    cell.classList.add('selected');
  }
  updatePanel();
}

function updatePanel() {
  const dates = [...selectedDates].sort();
  const el = document.getElementById('selectedDatesText');
  if(dates.length === 0) {
    el.textContent = 'カレンダーの日付をクリックして選択してください（複数可）';
  } else {
    el.textContent = '選択中: ' + dates.map(k => {
      const parts = k.split('-');
      return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
    }).join('、');
  }
  document.getElementById('btnRegister').disabled = dates.length === 0 || selectedSlots.size === 0;
}

// ---- スロット選択 ----
window.toggleSlot = function(btn) {
  const slot = btn.dataset.slot;
  if(selectedSlots.has(slot)) {
    selectedSlots.delete(slot);
    btn.classList.remove('selected');
  } else {
    selectedSlots.add(slot);
    btn.classList.add('selected');
  }
  updatePanel();
};

// ---- 登録 ----
window.register = function() {
  if(selectedDates.size === 0 || selectedSlots.size === 0) return;
  const updated = JSON.parse(JSON.stringify(entries));
  selectedDates.forEach(key => {
    if(!updated[key]) updated[key] = [];
    selectedSlots.forEach(slot => {
      const exists = updated[key].some(e => e.member === currentMember && e.slot === slot);
      if(!exists) updated[key].push({ member: currentMember, slot });
    });
    updated[key].sort((a,b) => {
      if(a.member !== b.member) return a.member - b.member;
      return SLOT_ORDER.indexOf(a.slot) - SLOT_ORDER.indexOf(b.slot);
    });
  });
  setDoc(entriesRef, { data: updated });
  clearSelection();
};

function removeEntry(key, member, slot) {
  const updated = JSON.parse(JSON.stringify(entries));
  if(!updated[key]) return;
  updated[key] = updated[key].filter(e => !(e.member === member && e.slot === slot));
  if(updated[key].length === 0) delete updated[key];
  setDoc(entriesRef, { data: updated });
}

window.clearSelection = function() {
  selectedDates.clear();
  selectedSlots.clear();
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  renderCalendar();
  updatePanel();
};

init();
</script>

    storageBucket: "tsunagu-calendar.firebasestorage.app",

  // Initialize Firebase

</script>

</body>
</html>
